server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # 核心新增：配置头像静态文件访问路由（对应后端容器的static/avatar路径）
        location /static/avatar/ {
            # 代理到后端服务获取头像文件（关键！）
            proxy_pass http://monitor-backend:8080/static/avatar/;
            # 缓存优化：头像文件不常变，设置30天缓存
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            # 跨域支持（和API保持一致）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;
            add_header Access-Control-Allow-Headers Content-Type,Authorization,Token;
        }

    # 处理Vue3静态文件和history路由（核心）
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 反向代理后端API接口（docker-compose中后端服务名：backend）
    location /api {
        proxy_pass http://monitor-backend:8080;  # 容器内网络，直接用服务名访问
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 解决OPTIONS预检请求跨域
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods GET,POST,PUT,DELETE,OPTIONS;
            add_header Access-Control-Allow-Headers Content-Type,Authorization,Token;
            return 204;
        }
    }

    # 禁止访问Nginx配置文件
    location ~ /\.ht {
        deny all;
    }
}
